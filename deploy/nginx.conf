# TLS termination + reverse proxy hacia oauth2-proxy.
# $VITRINA_HOST lo sustituye el entrypoint de la imagen nginx (envsubst, filtro = VITRINA_HOST).
server {
    listen 80;
    server_name ${VITRINA_HOST};
    # reto ACME de Let's Encrypt (renovacion via webroot)
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    http2 on;
    server_name ${VITRINA_HOST};

    ssl_certificate     /etc/letsencrypt/live/${VITRINA_HOST}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${VITRINA_HOST}/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 4m;

    location / {
        proxy_pass http://oauth2-proxy:4180;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;   # las consultas LLM pueden tardar unos segundos
    }
}
